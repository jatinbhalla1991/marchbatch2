name: Multi-Stage Workflow with Job Outputs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stage1-build:
    name: Stage 1 - Build with JSON
    runs-on: ubuntu-latest
    outputs:
      image_mapping: ${{ steps.build.outputs.image_mapping }}
    steps:
      - name: Build application
        id: build
        run: |
          image_mapping=$(jq -c -n \
            --arg artifact "myapp.zip" \
            --arg version "1.0.0" \
            '{artifact: $artifact, version: $version}')
          echo "image_mapping=$image_mapping" >> $GITHUB_OUTPUT

      - name: print JSON output
        run: echo '${{ steps.build.outputs.image_mapping }}''
          
  stage2-test:
    name: Stage 2 - Test and Print JSON
    runs-on: ubuntu-latest
    needs: stage1-build
    steps:
      - name: Print JSON outputs from Stage 1
        run: |
          echo "Received image mapping: ${{ needs.stage1-build.outputs.image_mapping }}"
          