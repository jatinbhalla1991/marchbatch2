name: Sample Workflow with Job Output

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  job1:
    name: Create Output
    runs-on: ubuntu-latest
    outputs:
      sample_output: ${{ steps.create_output.outputs.message }}
      timestamp: ${{ steps.create_output.outputs.time }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Create sample output
        id: create_output
        run: |
          echo "message=Hello from Job 1!" >> $GITHUB_OUTPUT
          echo "time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "Created output values"

  job2:
    name: Print Output
    runs-on: ubuntu-latest
    needs: job1
    
    steps:
      - name: Print received output
        run: |
          echo "Received message: ${{ needs.job1.outputs.sample_output }}"
          echo "Received timestamp: ${{ needs.job1.outputs.timestamp }}"
          echo "Successfully received output from Job 1!"